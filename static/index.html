<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>업체 견적 포털</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wide-shell">
      <section class="topbar">
        <div>
          <h1>업체 견적 포털</h1>
          <p>진행 중인 견적 요청과 제출한 견적을 확인합니다.</p>
        </div>
        <a class="ghost" href="/manager.html">담당자 화면</a>
      </section>

      <section class="panel portal-login" id="loginPanel">
        <h2>로그인</h2>
        <form id="vendorLoginForm" class="login-form">
          <label>
            <span>업체 이메일</span>
            <input name="email" type="email" required placeholder="예: hong@example.com" />
          </label>
          <button class="primary" type="submit">로그인</button>
        </form>
      </section>

      <section class="panel hidden" id="projectPanel">
        <div class="section-head">
          <div>
            <h2>진행 프로젝트</h2>
            <p id="loginSummary"></p>
          </div>
          <button class="ghost" type="button" id="logoutButton">로그아웃</button>
        </div>
        <div id="vendorProjectList" class="list"></div>
      </section>
    </main>
    <script src="/portal.js"></script>
  </body>
</html>
