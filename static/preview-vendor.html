<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>업체 입력 미리보기</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wide-shell">
      <section class="topbar">
        <div>
          <h1>ABC컴퓨터 견적 단가 입력</h1>
          <p>2026 서버 증설 사업 · 마감일: 2026-06-30</p>
        </div>
      </section>
      <section class="panel">
        <div class="save-status">제출 완료 · 2026. 6. 30. 오전 10:14:22</div>
        <div class="table-wrap">
          <table>
            <tr><th>구분</th><th>부품명</th><th>사양</th><th>수량</th><th>단가</th></tr>
            <tr><td>CPU</td><td>Intel Xeon</td><td>Gold 6430 또는 동급</td><td>2 EA</td><td><input class="price-input" value="2,450,000" /></td></tr>
            <tr><td>RAM</td><td>DDR5 ECC RDIMM</td><td>64GB</td><td>16 EA</td><td><input class="price-input" value="320,000" /></td></tr>
            <tr><td>SSD</td><td>NVMe SSD</td><td>3.84TB Enterprise</td><td>4 EA</td><td><input class="price-input" value="690,000" /></td></tr>
            <tr><td>GPU</td><td>NVIDIA GPU</td><td>L40S 또는 동급</td><td>2 EA</td><td><input class="price-input" value="9,800,000" /></td></tr>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
