<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>견적 단가 입력</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wide-shell">
      <section class="topbar">
        <div>
          <h1 id="title">견적 단가 입력</h1>
          <p id="summary"></p>
        </div>
      </section>

      <section id="quoteForm" class="panel">
        <div class="vendor-card" id="vendorCard"></div>
        <div class="save-status" id="saveStatus">단가를 입력하면 임시 저장됩니다.</div>
        <div class="table-wrap">
          <table id="quoteTable"></table>
        </div>
        <div class="submit-bar">
          <div class="muted">최종 제출을 누르면 회사 담당자에게 제출 완료 알림이 갑니다.</div>
          <button class="primary submit-button" type="button" id="finalSubmitButton">최종 제출</button>
        </div>
      </section>
    </main>
    <script src="/vendor.js"></script>
  </body>
</html>
